name: Add changeset from conventional commits

on:
  workflow_call:
    secrets:
      ECOSCRIPT_APP_ID:
        required: true
      ECOSCRIPT_APP_PRIVATE_KEY:
        required: true

concurrency: ${{ github.repository_owner_id }}-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  run:
    if: github.repository_owner == 'portabletext'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.ECOSCRIPT_CLIENT_ID }}
          private-key: ${{ secrets.ECOSCRIPT_APP_PRIVATE_KEY }}
      - uses: mscharley/dependency-changesets-action@f96232368519695969bea8a8cfff7cca32b1e56a # v1.2.4
        with:
          token: ${{ steps.app-token.outputs.token }}
          use-conventional-commits: true
          sign-commits: true
