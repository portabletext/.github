name: Prettier

on:
  workflow_call:
    secrets:
      ECOSCRIPT_APP_ID:
        required: true
      ECOSCRIPT_APP_PRIVATE_KEY:
        required: true

concurrency:
  group: ${{ github.repository_owner_id }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    if: github.repository_owner == 'portabletext'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*
      - run: pnpm install
      - run: pnpm format
      - run: git restore .github/workflows pnpm-lock.yaml
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.ECOSCRIPT_CLIENT_ID }}
          private-key: ${{ secrets.ECOSCRIPT_APP_PRIVATE_KEY }}
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          body: I ran `pnpm format` 🧑‍💻
          branch: actions/format
          commit-message: "chore(format): 🤖 ✨"
          delete-branch: true
          labels: 🤖 bot
          sign-commits: true
          title: "chore(format): 🤖 ✨"
          token: ${{ steps.app-token.outputs.token }}
